<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮盘赌:生与死</title>
    <!-- 这里接第二部分 CSS 样式 -->
     <style>
    :root {
        --bg-color: #1a1a1a;
        --text-color: #e0e0e0;
        --accent-color: #ff4d4d;
        --secondary-color: #4d79ff;
        --panel-bg: #2b2b2b;
        --gold: #ffd700;
    }

    body {
        font-family: 'Courier New', Courier, monospace;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
    }

    h1 { text-shadow: 0 0 10px var(--accent-color); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

    #game-container {
        width: 100%;
        max-width: 600px;
        background: var(--panel-bg);
        border: 2px solid #444;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        position: relative;
        overflow: hidden;
    }

    /* 疯狂模式特效 */
    .crazy-mode {
        border: 2px solid var(--accent-color);
        box-shadow: 0 0 30px rgba(255, 77, 77, 0.3);
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
        50% { box-shadow: 0 0 40px rgba(255, 77, 77, 0.5); }
        100% { box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
    }

    #setup-screen { text-align: center; }
    input[type="text"] {
        padding: 10px;
        font-size: 16px;
        background: #333;
        border: 1px solid #555;
        color: white;
        width: 70%;
        margin-bottom: 10px;
        font-family: inherit;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background: var(--secondary-color);
        color: white;
        border: none;
        border-radius: 5px;
        transition: 0.2s;
        font-family: inherit;
        font-weight: bold;
    }
    button:hover { filter: brightness(1.2); }
    button:disabled { background: #555; cursor: not-allowed; }

    #game-screen { display: none; }
    
    .status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        padding: 10px;
        background: #222;
        border-radius: 5px;
        border: 1px solid #333;
    }

    .player-info { text-align: center; flex: 1; }
    .active-turn { color: var(--accent-color); font-weight: bold; text-shadow: 0 0 5px var(--accent-color); transform: scale(1.1); display: inline-block; }
    
    .gun-status { margin: 20px 0; text-align: center; }
    .revolver-cylinder {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 15px 0;
    }
    .chamber {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #333;
        border: 2px solid #666;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: #555;
    }
    .chamber.filled { background: var(--accent-color); border-color: #ff0000; box-shadow: 0 0 10px var(--accent-color); }
    
    .m80-status { color: var(--accent-color); font-weight: bold; margin-top: 5px; }

    #log {
        height: 250px;
        overflow-y: auto;
        background: #111;
        border: 1px solid #333;
        padding: 10px;
        margin-bottom: 20px;
        font-size: 14px;
        list-style-type: none;
        font-family: 'Consolas', monospace;
    }
    #log li { margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; }
    .log-danger { color: var(--accent-color); font-weight: bold; }
    .log-safe { color: #4caf50; }
    .log-special { color: var(--gold); font-weight: bold; }
    .log-info { color: #aaa; }

    #controls { display: flex; flex-direction: column; gap: 10px; text-align: center; }
    .hidden { display: none !important; }

    /* 新增：填弹输入框样式 */
    .input-reload {
        width: 50px;
        padding: 5px;
        text-align: center;
        background: #333;
        border: 1px solid #555;
        color: white;
        font-family: inherit;
    }
</style>
</head>
<body>

    <h1>🔫 左轮互射</h1>

    <div id="game-container">
        <!-- 设置界面 -->
        <div id="setup-screen">
            <h2>战前准备</h2>
            <p>请输入玩家1的名字:</p>
            <input type="text" id="p1-name-input" placeholder="玩家1名字">
            <br>
            <input type="text" id="p2-name-input" placeholder="玩家2名字" value="敌人">
            <br>
            <button onclick="startGame()">开始游戏</button>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen">
            <div class="status-bar">
                <div class="player-info" id="p1-display">
                    <h3 id="p1-name">Player 1</h3>
                    <div id="p1-hp">存活</div>
                    <div id="p1-buff" class="hidden">🎖️ 老兵祝福</div>
                </div>
                <div class="player-info" id="p2-display">
                    <h3 id="p2-name">Player 2</h3>
                    <div id="p2-hp">存活</div>
                </div>
            </div>

            <!-- 枪械状态 -->
            <div class="gun-status">
                <div id="gun-title">左轮手枪弹巢</div>
                <div class="revolver-cylinder" id="cylinder-visual"></div>
                <div id="m80-container" class="hidden">
                    <div>M80 穿甲弹枪</div>
                    <div class="revolver-cylinder" id="m80-visual"></div>
                    <div class="m80-status">当前弹量: <span id="m80-count">0</span>/6</div>
                </div>
            </div>

            <ul id="log"></ul>

            <div id="controls">
                <!-- 填弹阶段 -->
                <div id="phase-load" class="hidden">
                    <p>当前回合：<span id="current-turn-name" style="color:var(--accent-color)"></span></p>
                    <p>弹巢剩余空位: <span id="empty-slots">0</span></p>
                    <p>
                        输入塞入子弹数量 (0-2): 
                        <input type="number" id="reload-input" class="input-reload" value="0" min="0" max="2">
                    </p>
                    <button onclick="confirmLoad()">确认填弹</button>
                </div>

                <!-- 射击阶段 -->
                <div id="phase-shoot" class="hidden">
                    <p id="shoot-msg" style="font-size: 18px; margin: 20px 0;"></p>
                    <button id="btn-shoot" onclick="shoot()">扣动扳机</button>
                </div>

                <!-- 决策阶段 -->
                <div id="phase-decision" class="hidden">
                    <p id="decision-text" style="color: var(--secondary-color); font-weight: bold;"></p>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <!-- 注意：这个按钮默认隐藏，只有跳弹才显示 -->
                        <button id="btn-reload-decision" class="hidden" onclick="enterLoadPhase()">塞子弹 (0-2发)</button>
                        <button id="btn-pass" onclick="passTurn()">把枪给对手</button>
                        <button id="btn-shoot-again" onclick="shootAgain()">再射一枪</button>
                    </div>
                </div>
                
                <!-- 游戏结束 -->
                <div id="phase-gameover" class="hidden">
                    <h2 id="winner-text"></h2>
                    <button onclick="location.reload()">重新开始</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 这里接第三部分 JavaScript 逻辑 -->
    <script>
    // 游戏状态
    const state = {
        p1: { name: '', hp: 100, isCrazy: false, hasBuff: false },
        p2: { name: '', hp: 100 },
        cylinder: [false, false, false, false, false, false], // 左轮 6发
        m80Cylinder: [false, false, false, false, false, false], // M80 6发
        turn: 1, // 1 or 2
        phase: 'setup', 
        lastResult: null // 'empty', 'ricochet', 'hit'
    };

    // 初始化
    function startGame() {
        const p1Input = document.getElementById('p1-name-input').value.trim();
        const p2Input = document.getElementById('p2-name-input').value.trim();

        state.p1.name = p1Input || "玩家1";
        state.p2.name = p2Input || "玩家2";

        // 检查疯狂模式
        if (state.p1.name === "78") {
            state.p1.isCrazy = true;
            log("⚠️ 警告：检测到疯狂模式！双枪系统已启动！", "log-special");
        }

        // 1% 概率获得老兵祝福
        if (Math.random() < 0.01) {
            state.p1.hasBuff = true;
            log("✨ 幸运！玩家1获得了【二战老兵的祝福】！头盔跳弹率大幅提升！", "log-special");
        }

        // 更新UI
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('p1-name').innerText = state.p1.name;
        document.getElementById('p2-name').innerText = state.p2.name;
        
        if (state.p1.hasBuff) document.getElementById('p1-buff').classList.remove('hidden');
        
        const container = document.getElementById('game-container');
        if (state.p1.isCrazy) {
            container.classList.add('crazy-mode');
            document.getElementById('m80-container').classList.remove('hidden');
        }

        updateUI();
        enterLoadPhase();
    }

    // 更新界面显示
    function updateUI() {
        renderCylinder('cylinder-visual', state.cylinder);
        
        if (state.p1.isCrazy) {
            renderCylinder('m80-visual', state.m80Cylinder);
            const m80Count = state.m80Cylinder.filter(x => x).length;
            document.getElementById('m80-count').innerText = m80Count;
        }
    }

    function renderCylinder(elementId, cylinderArray) {
        const cylDiv = document.getElementById(elementId);
        cylDiv.innerHTML = '';
        cylinderArray.forEach((isBullet) => {
            const chamber = document.createElement('div');
            chamber.className = `chamber ${isBullet ? 'filled' : ''}`;
            chamber.innerText = isBullet ? '●' : '○';
            cylDiv.appendChild(chamber);
        });
    }

    // 填弹阶段
    function enterLoadPhase() {
        state.phase = 'load';
        hideAllPhases();
        document.getElementById('phase-load').classList.remove('hidden');

        const currentBulletCount = state.cylinder.filter(x => x).length;
        const emptySlots = 6 - currentBulletCount;
        
        document.getElementById('current-turn-name').innerText = `玩家${state.turn}`;
        document.getElementById('empty-slots').innerText = emptySlots;

        // 设置输入框最大值
        const input = document.getElementById('reload-input');
        input.max = Math.min(2, emptySlots);
        input.value = 0;
    }

    // 执行填弹
    function confirmLoad() {
        const input = document.getElementById('reload-input');
        let count = parseInt(input.value);
        const emptySlots = 6 - state.cylinder.filter(x => x).length;
        
        if (count > emptySlots) count = emptySlots;
        if (count < 0) count = 0;
        if (count > 2) count = 2;

        // 随机填充空位（而不是从前往后填）
        let emptyIndices = [];
        for (let i = 0; i < 6; i++) {
            if (!state.cylinder[i]) emptyIndices.push(i);
        }
        
        // 打乱空位顺序，然后随机选count个填
        emptyIndices.sort(() => Math.random() - 0.5);
        
        let added = 0;
        for (let i = 0; i < count; i++) {
            state.cylinder[emptyIndices[i]] = true;
            added++;
        }

        // 如果是疯狂模式且是玩家1，同时填M80
        let m80Added = 0;
        if (state.p1.isCrazy && state.turn === 1) {
            let m80EmptyIndices = [];
            for (let i = 0; i < 6; i++) {
                if (!state.m80Cylinder[i]) m80EmptyIndices.push(i);
            }
            m80EmptyIndices.sort(() => Math.random() - 0.5);
            
            for (let i = 0; i < count; i++) {
                state.m80Cylinder[m80EmptyIndices[i]] = true;
                m80Added++;
            }
            log(`玩家1 填装了 ${count} 发左轮弹 和 ${m80Added} 发 M80 穿甲弹。`, "log-info");
        } else {
            log(`玩家${state.turn} 填装了 ${count} 发子弹。`, "log-info");
        }

        updateUI();
        enterShootPhase();
    }

    // 射击阶段
    function enterShootPhase() {
        state.phase = 'shoot';
        hideAllPhases();
        document.getElementById('phase-shoot').classList.remove('hidden');
        
        const shooterName = state.turn === 1 ? state.p1.name : state.p2.name;
        document.getElementById('shoot-msg').innerHTML = `轮到 <span style="color:var(--accent-color)">${shooterName}</span> 射击自己！`;
    }

    // 射击逻辑
    function shoot() {
        const isP1 = state.turn === 1;
        const targetName = isP1 ? state.p1.name : state.p2.name;
        
        log(`----------------------------------------`);
        log(`${targetName} 把枪口对准了自己...`, "log-info");

        const revolverResult = resolveRevolver();
        
        let m80Hit = false;
        if (state.p1.isCrazy && isP1) {
            m80Hit = resolveM80();
        }

        let damageTaken = false;

        if (m80Hit) {
            log(`💥 M80穿甲弹直接命中！无视头盔防御！`, "log-danger");
            damageTaken = true;
        } else if (revolverResult === 'hit') {
            log(`💥 左轮实弹命中！`, "log-danger");
            damageTaken = true;
        } else if (revolverResult === 'ricochet') {
            log(`🛡️ 叮！子弹在头盔上跳弹了！(幸运)`, "log-safe");
            damageTaken = false;
        } else {
            log(`🔫 咔哒。是空弹。`, "log-safe");
            damageTaken = false;
        }

        if (damageTaken) {
            endGame(state.turn === 1 ? 2 : 1);
        } else {
            state.lastResult = revolverResult;
            handleSurvival();
        }
        
        updateUI();
    }

function resolveRevolver() {
    const bulletCount = state.cylinder.filter(x => x).length;
    if (bulletCount === 0) return 'empty';

    const randomChamberIndex = Math.floor(Math.random() * 6);
    
    const isBulletInChamber = state.cylinder[randomChamberIndex];

    if (isBulletInChamber) {
        state.cylinder[randomChamberIndex] = false;
    }

    const isP1 = state.turn === 1;
    const hasBuff = isP1 ? state.p1.hasBuff : false;
    
    let ricochetChance = 1/30; // 默认 1/30 概率
    if (hasBuff) ricochetChance = 1/2; // 老兵祝福提升到 1/2 概率
    
    if (Math.random() < ricochetChance) {
        return 'ricochet';
    }

    if (isBulletInChamber) {
        return 'hit'; // 实弹命中
    } else {
        return 'empty'; // 空弹（哑火）
    }
}
    // 修改后的：M80判定 - 随机旋转弹巢
function resolveM80() {
    // 1. 检查 M80 弹巢里还有没有子弹
    const bulletCount = state.m80Cylinder.filter(x => x).length;
    if (bulletCount === 0) return false; // 没子弹了，直接返回未命中

    // 2. 核心修改：随机生成一个 0-5 的位置
    const randomChamberIndex = Math.floor(Math.random() * 6);
    
    // 3. 检查这个随机位置里有没有 M80 子弹
    const isBulletInChamber = state.m80Cylinder[randomChamberIndex];

    // 4. 如果该位置有子弹，消耗掉它
    if (isBulletInChamber) {
        state.m80Cylinder[randomChamberIndex] = false;
    }

    // 5. 返回结果：如果该位置有子弹，返回命中；否则返回未命中
    return isBulletInChamber;
}

    // 存活处理
    function handleSurvival() {
        hideAllPhases();
        document.getElementById('phase-decision').classList.remove('hidden');

        const resultText = state.lastResult === 'ricochet' ? "跳弹存活" : "空弹存活";
        document.getElementById('decision-text').innerText = `结果：${resultText}！请选择行动：`;

        const reloadBtn = document.getElementById('btn-reload-decision');
        if (state.lastResult === 'ricochet') {
            reloadBtn.classList.remove('hidden');
        } else {
            reloadBtn.classList.add('hidden');
        }
    }

    // 决策：把枪给对手
    function passTurn() {
        state.turn = state.turn === 1 ? 2 : 1;
        log(`玩家${state.turn === 1 ? 2 : 1} 将枪交给了对手。`, "log-info");
        enterLoadPhase();
    }

    // 决策：再射一枪
    function shootAgain() {
        log(`玩家${state.turn} 决定再赌一次命！`, "log-special");
        enterShootPhase();
    }

    // 游戏结束
    function endGame(winner) {
        hideAllPhases();
        document.getElementById('phase-gameover').classList.remove('hidden');
        const winnerName = winner === 1 ? state.p1.name : state.p2.name;
        document.getElementById('winner-text').innerText = `💀 玩家${winner} (${winnerName}) 获胜！`;
        log(`游戏结束！获胜者是：${winnerName}`, "log-special");
    }

    // 通用：隐藏所有阶段
    function hideAllPhases() {
        const phases = ['phase-load', 'phase-shoot', 'phase-decision', 'phase-gameover'];
        phases.forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    // 通用：日志
    function log(msg, className = '') {
        const logList = document.getElementById('log');
        const item = document.createElement('li');
        item.innerHTML = msg;
        if (className) item.classList.add(className);
        logList.appendChild(item);
        logList.scrollTop = logList.scrollHeight;
    }
</script>
</body>
</html>
